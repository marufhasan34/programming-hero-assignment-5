<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- tailwind + daisyUI -->
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- google fonts -->
    <!-- font awosome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- font awosome -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="container mx-auto">
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <div class="flex gap-3 items-center">
            <img class="w-[36px]" src="./assets/github-logo.png" alt="" />
            <h3 class="font-semibold text-2xl">GitHub Issues Tracker</h3>
          </div>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-24 md:w-auto"
          />
          <button class="btn btn-primary">Search</button>
        </div>
      </div>
    </header>

    <main class="container mx-auto my-16">
      <!-- buttons -->
      <div class="card card-body shadow-xl">
        <div>
          <button
            onclick="handleFilter('all')"
            id="allBtn"
            class="btn border-gray-600 btn-primary"
          >
            All
          </button>
          <button
            onclick="handleFilter('open')"
            id="openBtn"
            class="btn border-gray-600"
          >
            open
          </button>
          <button
            onclick="handleFilter('closed')"
            id="closedBtn"
            class="btn border-gray-600"
          >
            closed
          </button>
        </div>
      </div>
      <!-- buttons -->

      <!-- show issues  count-->
      <div class="card card-body shadow-xl my-10">
        <div class="flex justify-between items-center">
          <div class="flex gap-4 items-center">
            <div><img src="./assets/Aperture.png" alt="" /></div>
            <div>
              <h3 class="font-bold text-2xl"><span>0</span>Issues</h3>
              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-3">
            <p><i class="fa-solid fa-circle-dot text-green-500"></i> open</p>
            <p><i class="fa-solid fa-circle-dot text-purple-500"></i> closed</p>
          </div>
        </div>
      </div>
      <!-- show issues count -->
      <!-- show all issues card -->
      <div
        id="cardContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"
      ></div>
      <!-- loading -->
      <div id="loadingSpinner" class="flex hidden justify-center items-center">
        <span class="loading loading-spinner loading-xl"></span>
      </div>
      <!-- loading -->

      <!-- modal -->
      <dialog id="cardDetailsModal" class="modal">
        <div class="modal-box">
          <div id="details-container" class="space-y-4">
            
          </div>
        </div>
      </dialog>
      <!-- modal -->

      <!-- show all issues card -->
    </main>

    <script src="./script.js"></script>
  </body>
</html>
